name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: bizmind
          POSTGRES_PASSWORD: bizmind
          POSTGRES_DB: bizmind_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bizmind -d bizmind_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://bizmind:bizmind@localhost:5432/bizmind_test
      REDIS_URL: redis://localhost:6379/0
      QDRANT_URL: http://localhost:6333
      SECRET_KEY: ci-test-secret-key-at-least-32-chars-long
      APP_ENV: test
      LLM_API_KEY: test-key-mock

    steps:
      - uses: actions/checkout@v4

      - name: Start Qdrant
        run: |
          docker run -d --name qdrant -p 6333:6333 qdrant/qdrant:latest
          for i in {1..30}; do
            curl -sf http://localhost:6333/readyz && break
            sleep 2
          done

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.5.14"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format
        run: uv run ruff format --check .

      - name: Mypy
        continue-on-error: true
        run: uv run mypy app/

      - name: Pytest
        run: uv run pytest tests/ -q --cov=app --cov-report=term-missing --cov-fail-under=70

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Build images
        run: docker compose build

      - name: Smoke up
        run: |
          cp .env.example .env
          docker compose up -d postgres redis qdrant
          sleep 10
          docker compose up -d backend
          for i in {1..30}; do
            curl -sf http://localhost:8000/api/v1/health && break
            sleep 3
          done
          curl -sf http://localhost:8000/api/v1/health | grep -q healthy

      - name: Tear down
        if: always()
        run: docker compose down -v
