repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: [--fix]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^docs/.*\.md$
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: [--maxkb=20480]
      - id: detect-private-key

  - repo: local
    hooks:
      - id: no-env-commit
        name: block .env files
        entry: bash -c 'if git diff --cached --name-only | grep -E "^\.env$|^\.env\."; then echo "Do not commit .env files"; exit 1; fi'
        language: system
        pass_filenames: false
